name: Build and Test

on:
  push:
    branches: [ master, develop ]
  pull_request:
    branches: [ master, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  SOLUTION_PATH: 'smodr.slnx'
  CONFIGURATION: 'Release'

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: windows-latest
    permissions:
      contents: read

    strategy:
      matrix:
        platform: [x64, ARM64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ matrix.platform }}-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-${{ matrix.platform }}-
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }} -p:Platform=${{ matrix.platform }} --locked-mode

    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-restore -p:Platform=${{ matrix.platform }} -warnaserror

    - name: Run tests
      if: matrix.platform == 'x64'
      run: dotnet test ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-build -p:Platform=${{ matrix.platform }} --logger "trx;LogFileName=test-results.trx"

    - name: Upload build artifacts
      if: success()
      uses: actions/upload-artifact@v7
      with:
        name: build-${{ matrix.platform }}
        path: |
          **/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**
          !**/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/ref/**
          !**/bin/${{ matrix.platform }}/${{ env.CONFIGURATION }}/**/*.pdb
        retention-days: 7

  format-check:
    name: Check Code Formatting
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }} --locked-mode

    - name: Check code formatting
      run: dotnet format ${{ env.SOLUTION_PATH }} --verify-no-changes --verbosity diagnostic
